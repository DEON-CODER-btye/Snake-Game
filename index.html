<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <link rel="stylesheet" href="output.css">
  <link rel="stylesheet" href="style.css">
  <link
    href="https://fonts.googleapis.com/css?family=Poppins:100,100italic,200,200italic,300,300italic,regular,italic,500,500italic,600,600italic,700,700italic,800,800italic,900,900italic"
    rel="stylesheet" />
</head>

<body class=" font-['Poppins'] text-green-500 bg-[#083163] mx-5">
  <h1 class="md:text-6xl  text-3xl text-center mt-7 font-semibold"><span class="text-purple-500 ">Sn</span>ake Ga<span
      class="text-purple-500">me</span> 🐍</h1>
  <h3 class="score md:text-4xl text-2xl md:text-end text-center md:px-32 px-12 text-yellow-500 font-mono">HighScore: 0
  </h3>
  <div class="flex justify-center">
    <div
      class="board bg-[#083163] bg-opacity-75 w-full md:max-w-[700px] h-full md:min-h-[700px] max-w-[400px] min-h-[400px] border-2 border-gray-600 grid grid-cols-12 grid-rows-12 gap-0">
    </div>
  </div>
  <button
    class="reset hover:bg-gray-800 transition-all duration-300 flex mx-auto bg-black md:px-18 md:py-4 px-12 py-2 mt-6 text-2xl rounded-[6px] font-mono cursor-pointer">Reset</button>
  <script src="script.js"></script>
</body>

</html>
